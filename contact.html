  <!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Зворотній зв'язок</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Зворотній зв'язок</h2>
<form action="mailto:example@gmail.com" method="post" enctype="text/plain">
  <label for="name">Ваше ім'я:</label><br>
  <input type="text" id="name" name="name" required><br><br>

  <label for="email">Ваш email:</label><br>
  <input type="email" id="email" name="email" required><br><br>

  <label for="message">Повідомлення:</label><br>
  <textarea id="message" name="message" rows="5" cols="40"></textarea><br><br>

  <input type="submit" value="Відправити">
  <input type="reset" value="Очистити">
</form>
 <p><a href="index.html">Назад на головну</a></p>
</body>
</html>
